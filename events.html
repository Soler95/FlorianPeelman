<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Florian Peelman — Renowned violist performing across Europe and internationally." />
  <title>Florian Peelman — Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header" id="header">
    <a class="logo" href="index.html">FLORIAN PEELMAN</a>
    <button class="menu-toggle" id="menuBtn" aria-label="Toggle navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="nav" id="nav">
      <a href="index.html">Home</a>
      <a href="bio.html">Biography</a>
      <a href="media.html">Media</a>
      <a href="events.html">Calendar</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <!-- CALENDAR -->
  <section class="section" id="calendar">
    <div class="container">
      <span class="label">Concerts</span>
      <h2>Upcoming<br /><em>Events</em></h2>
      <div class="events-list">
        <p class="events-loading">Loading events…</p>
      </div>
    </div>
  </section>

  <!-- COOKIE BANNER -->
  <div id="cookieBanner" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#111; color:#fff; padding:1rem 2rem; z-index:9999; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
    <p style="margin:0; font-size:.875rem;">This website uses cookies to improve your experience.</p>
    <div style="display:flex; gap:.5rem;">
      <button onclick="acceptCookies()" style="padding:.4rem 1rem; background:#fff; color:#111; border:none; cursor:pointer; font-size:.875rem;">Accept</button>
      <button onclick="rejectCookies()" style="padding:.4rem 1rem; background:transparent; color:#fff; border:1px solid #fff; cursor:pointer; font-size:.875rem;">Reject</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">FLORIAN PEELMAN</div>
      <nav class="footer-nav">
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://youtube.com" target="_blank" rel="noopener noreferrer">YouTube</a>
        <a href="index.html#contact">Contact</a>
      </nav>
      <small class="footer-copy">&copy; <span id="year"></span> Florian Peelman. All rights reserved.</small>
    </div>
  </footer>

  <!-- MAIN SCRIPT -->
  <script>
    // Year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Header scroll effect
    const header = document.getElementById('header');
    window.addEventListener('scroll', function () {
      header.classList.toggle('scrolled', window.scrollY > 40);
    });

    // Mobile menu
    const nav = document.getElementById('nav');
    const btn = document.getElementById('menuBtn');

    btn.addEventListener('click', function () {
      const open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open);
      document.body.classList.toggle('menu-open', open);
      if (open) window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.querySelectorAll('#nav a').forEach(function (link) {
      link.addEventListener('click', function () {
        nav.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
        document.body.classList.remove('menu-open');
      });
    });

    document.addEventListener('click', function (e) {
      if (!nav.contains(e.target) && !btn.contains(e.target)) {
        nav.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
        document.body.classList.remove('menu-open');
      }
    });

    // Cookie banner
    function acceptCookies() {
      localStorage.setItem('cookies', 'accepted');
      document.getElementById('cookieBanner').style.display = 'none';
    }
    function rejectCookies() {
      localStorage.setItem('cookies', 'rejected');
      document.getElementById('cookieBanner').style.display = 'none';
    }
    if (!localStorage.getItem('cookies')) {
      document.getElementById('cookieBanner').style.display = 'flex';
    }

    // Scroll reveal
    const revealEls = document.querySelectorAll('.section, .event-card, .quote');
    const io = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    revealEls.forEach(function (el) { io.observe(el); });
  </script>

  <!-- GOOGLE SHEETS CALENDAR SCRIPT -->
  <script>
    const URL_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQayu9W_U8GOJuAbtoTwruRXO5xbMjfgx_5aFiV0k7H9_P5xKBBwj-OU0Xjw1FIQQ4lIJRUbMza6Z9R/pub?gid=0&single=true&output=csv';

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr + 'T00:00:00');
      if (isNaN(date)) return dateStr;
      return date.toLocaleDateString('en-GB', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    function parseCSV(text) {
      const rows = [];
      const lines = text.trim().split('\n');

      function parseLine(line) {
        const cols = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') {
            inQuotes = !inQuotes;
          } else if (c === ',' && !inQuotes) {
            cols.push(current.trim());
            current = '';
          } else {
            current += c;
          }
        }
        cols.push(current.trim());
        return cols;
      }

      const headers = parseLine(lines[0]);
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const values = parseLine(lines[i]);
        const obj = {};
        headers.forEach((header, j) => {
          obj[header.trim()] = values[j] || '';
        });
        rows.push(obj);
      }
      return rows;
    }

    const lista = document.querySelector('.events-list');

    fetch(URL_SHEET)
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP error: ' + r.status);
        return r.text();
      })
      .then(function (csv) {
        const events = parseCSV(csv);
        console.log('Column headers found:', Object.keys(events[0] || {}));
        console.log('Events found:', events.length);

        if (!events.length) {
          lista.innerHTML = '<p>No upcoming events.</p>';
          return;
        }

        lista.innerHTML = events.map(function (e) {
          const link = e.Link && e.Link !== '#' && e.Link !== '' ? e.Link : null;
          return `
            <article class="event-card is-visible">
              <div class="event-meta">
                <time class="event-date" datetime="${e.Date || ''}">
                  ${formatDate(e.Date)}
                </time>
                <span class="event-city">${e.City || ''}</span>
              </div>
              <div class="event-body">
                <h3 class="event-venue">${e.Venue || ''}</h3>
                <p class="event-program">${e.Program || ''}</p>
              </div>
              ${link
                ? `<a class="event-link" href="${link}" target="_blank" rel="noopener noreferrer">
                    <span>Details</span>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                      <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor"
                            stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </a>`
                : `<span class="event-link event-link--disabled">
                    <span>Details</span>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                      <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor"
                            stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </span>`
              }
            </article>
          `;
        }).join('');
      })
      .catch(function (err) {
        console.error('Error loading events:', err);
        lista.innerHTML = '<p>Could not load events. Please try again later.</p>';
      });
  </script>

</body>
</html>
