<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Florian Peelman — Students" />
  <title>Florian Peelman — Students</title>

  <!-- Same fonts as the rest of the site -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Your existing stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── Students-only styles (complement, never override) ── */

    /* Hero banner (same pattern as bio.html) */
    .students-hero {
      position: relative;
      padding: 10rem var(--gutter) 6rem;
      background: var(--ink);
      color: var(--cream);
      overflow: hidden;
      text-align: left;
    }
    .students-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 60% 0%,
        rgba(201,169,110,0.10) 0%, transparent 65%);
      pointer-events: none;
    }
    .students-hero .label { margin-bottom: 1rem; }
    .students-hero h1    { color: var(--cream); margin-bottom: 0; }
    .students-hero p     { margin-top: 1rem; color: var(--cream-dim); max-width: 52ch; }

    /* Grid */
    .students-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-top: 3rem;
    }
    @media (max-width: 700px) {
      .students-grid { grid-template-columns: 1fr; }
    }

    /* Card */
    .student-card {
      background: var(--white);
      border: 1px solid var(--cream-dim);
      transition: box-shadow 0.3s var(--ease), transform 0.3s var(--ease);
    }
    .student-card:hover {
      box-shadow: 0 12px 48px rgba(26,22,18,0.12);
      transform: translateY(-3px);
    }

    /* Photo */
    .card-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: var(--cream-dim);
    }
    .card-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s var(--ease);
    }
    .student-card:hover .card-photo img { transform: scale(1.05); }
    .card-photo .no-photo {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    /* Card body */
    .card-body { padding: 1.5rem 1.75rem; }

    .card-name {
      font-family: var(--font-display);
      font-size: clamp(1.3rem, 2.5vw, 1.65rem);
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 0.25rem;
      line-height: 1.15;
    }
    .card-period {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.25rem;
    }

    /* Accordion */
    .bio-toggle {
      width: 100%;
      background: none;
      border: none;
      border-top: 1px solid var(--cream-dim);
      padding: 1rem 0 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      font-family: var(--font-ui);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-soft);
      transition: color 0.25s;
    }
    .bio-toggle:hover { color: var(--gold); }

    .toggle-icon {
      width: 22px; height: 22px;
      border: 1px solid var(--cream-dim);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.25s, background 0.25s, transform 0.35s var(--ease);
    }
    .toggle-icon svg {
      width: 10px; height: 10px;
      transition: transform 0.35s var(--ease);
    }
    .toggle-icon svg path {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .student-card.open .toggle-icon {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--white);
    }
    .student-card.open .toggle-icon svg { transform: rotate(180deg); }
    .student-card.open .bio-toggle      { color: var(--gold); }

    /* Bio content */
    .bio-content {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.45s var(--ease), opacity 0.3s ease, padding 0.3s ease;
    }
    .student-card.open .bio-content {
      max-height: 800px;
      opacity: 1;
      padding-top: 1.1rem;
    }
    .bio-text {
      font-family: var(--font-body);
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--ink-mid);
    }
    .bio-text p + p { margin-top: 0.75rem; }

    /* Status messages */
    .students-status {
      text-align: center;
      padding: 5rem 0;
      font-family: var(--font-ui);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .students-status.error { color: #c0392b; }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════
       HEADER — exact copy from index.html
  ══════════════════════════════════ -->
  <header class="header" id="site-header">
    <a href="index.html" class="logo">Florian Peelman</a>

    <nav class="nav" id="main-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="bio.html">Biography</a>
      <a href="students.html" aria-current="page">Students</a>
      <a href="media.html">Media</a>
      <a href="index.html#calendar">Calendar</a>
      <a href="index.html#contact">Contact</a>
    </nav>

    <button class="menu-toggle" id="menu-toggle"
            aria-label="Toggle navigation" aria-expanded="false"
            aria-controls="main-nav">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- ══════════════════════════════════
       HERO
  ══════════════════════════════════ -->
  <section class="students-hero">
    <div class="container">
      <span class="label">Florian Peelman</span>
      <h1>My <em>Students</em></h1>
      <p>A selection of talented violists currently studying or who have studied under Florian Peelman.</p>
    </div>
  </section>

  <!-- ══════════════════════════════════
       STUDENTS GRID
  ══════════════════════════════════ -->
  <section class="section is-visible" style="padding-block: clamp(4rem,8vw,7rem);">
    <div class="container">
      <div id="students-status" class="students-status">Loading students…</div>
      <div id="students-grid"   class="students-grid" style="display:none;"></div>
    </div>
  </section>

  <!-- ══════════════════════════════════
       FOOTER — exact copy from index.html
  ══════════════════════════════════ -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand">Florian Peelman</span>
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a>
        <a href="https://youtube.com"   target="_blank" rel="noopener">YouTube</a>
        <a href="index.html#contact">Contact</a>
      </nav>
      <p class="footer-copy">© Florian Peelman. All rights reserved.</p>
    </div>
  </footer>

  <script>
    /* ── Header scroll effect (same as index.html) ── */
    const header = document.getElementById('site-header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    /* ── Hamburger menu (same as index.html) ── */
    const toggle = document.getElementById('menu-toggle');
    const nav    = document.getElementById('main-nav');
    toggle.addEventListener('click', () => {
      const open = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!open));
      nav.classList.toggle('is-open', !open);
      document.body.classList.toggle('menu-open', !open);
    });
    // Close menu on link click
    nav.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        toggle.setAttribute('aria-expanded', 'false');
        nav.classList.remove('is-open');
        document.body.classList.remove('menu-open');
      });
    });

    /* ── Google Sheet CSV URL ── */
    const SHEET_CSV_URL =
      'https://docs.google.com/spreadsheets/d/e/2PACX-1vQayu9W_U8GOJuAbtoTwruRXO5xbMjfgx_5aFiV0k7H9_P5xKBBwj-OU0Xjw1FIQQ4lIJRUbMza6Z9R/pub?gid=953365315&single=true&output=csv';

    /* ── CSV parser (handles quoted fields with commas & newlines) ── */
    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuote = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuote) {
          if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
          else if (ch === '"') { inQuote = false; }
          else { field += ch; }
        } else {
          if      (ch === '"')  { inQuote = true; }
          else if (ch === ',')  { row.push(field); field = ''; }
          else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else if (ch === '\r') { /* skip */ }
          else { field += ch; }
        }
      }
      if (field || row.length) { row.push(field); rows.push(row); }
      return rows;
    }

    function csvToObjects(rows) {
      if (!rows.length) return [];
      const headers = rows[0].map(h => h.trim().toLowerCase());
      return rows.slice(1)
        .filter(r => r.some(c => c.trim()))
        .map(r => {
          const obj = {};
          headers.forEach((h, i) => { obj[h] = (r[i] || '').trim(); });
          return obj;
        });
    }

    /* ── Convert Google Drive share links → embeddable thumbnail ── */
    function driveImgUrl(url) {
      if (!url) return '';
      const m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
      return url;
    }

    /* ── Escape helpers ── */
    function escHtml(s)  { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escAttr(s)  { return s.replace(/"/g,'&quot;'); }

    /* ── Build one card ── */
    function createCard(student) {
      const name   = student.name   || 'Student';
      const period = student.instrument || '';
      const photo  = driveImgUrl(student.photo || '');
      const bio    = (student.bio || '').replace(/""/g, '').trim();

      const bioHTML = bio
        .split(/\n+/)
        .filter(p => p.trim())
        .map(p => `<p>${escHtml(p.trim())}</p>`)
        .join('') || '<p>Biography coming soon.</p>';

      const photoHTML = photo
        ? `<img src="${escAttr(photo)}" alt="${escAttr(name)}" loading="lazy" />`
        : `<div class="no-photo">No photo</div>`;

      return `
        <article class="student-card">
          <div class="card-photo">${photoHTML}</div>
          <div class="card-body">
            <h2 class="card-name">${escHtml(name)}</h2>
            ${period ? `<p class="card-period">${escHtml(period)}</p>` : ''}
            <button class="bio-toggle" aria-expanded="false">
              <span class="toggle-label">Read biography</span>
              <span class="toggle-icon" aria-hidden="true">
                <svg viewBox="0 0 12 12"><path d="M2 4l4 4 4-4"/></svg>
              </span>
            </button>
            <div class="bio-content">
              <div class="bio-text">${bioHTML}</div>
            </div>
          </div>
        </article>`;
    }

    /* ── Accordion toggle ── */
    function initAccordions() {
      document.querySelectorAll('.bio-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const card   = btn.closest('.student-card');
          const isOpen = card.classList.contains('open');
          card.classList.toggle('open', !isOpen);
          btn.setAttribute('aria-expanded', String(!isOpen));
          btn.querySelector('.toggle-label').textContent =
            isOpen ? 'Read biography' : 'Close biography';
        });
      });
    }

    /* ── Fetch & render ── */
    async function loadStudents() {
      const statusEl = document.getElementById('students-status');
      const gridEl   = document.getElementById('students-grid');
      try {
        const res  = await fetch(SHEET_CSV_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text     = await res.text();
        const students = csvToObjects(parseCSV(text));

        if (!students.length) {
          statusEl.textContent = 'No students found in the sheet.';
          return;
        }
        gridEl.innerHTML    = students.map(createCard).join('');
        statusEl.style.display = 'none';
        gridEl.style.display   = 'grid';
        initAccordions();
      } catch (err) {
        console.error(err);
        statusEl.className   = 'students-status error';
        statusEl.textContent = 'Could not load students — check the Google Sheet URL.';
      }
    }

    loadStudents();
  </script>

</body>
</html>
